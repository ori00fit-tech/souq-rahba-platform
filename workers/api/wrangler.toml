name = "souq-api"
main = "src/index.ts"
compatibility_date = "2026-03-06"

[[d1_databases]]
binding = "DB"
database_name = "souq-db"
database_id = "REPLACE_ME"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "souq-media"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_ME"

[vars]
APP_ENV = "production"
JWT_ISSUER = "souq-api"
